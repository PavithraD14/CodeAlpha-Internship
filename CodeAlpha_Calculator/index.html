<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculator using operators Function">
    <title>Calculator using JS</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
    <div class="display" id="display">0</div>

    <div class= "buttons">
   <button>(</button>
   <button>)</button>
   <button>CE</button>
   <button>C</button>
   <button>+</button>
   <button>7</button>
   <button>8</button>
   <button>9</button>
   <button>/</button>
   <button>4</button>
   <button>5</button>
   <button>6</button>
   <button>*</button>
   <button>1</button>
   <button>2</button>
   <button>3</button>
   <button>-</button>
   <button>.</button>
   <button>%</button>
   <button>0</button>
   <button>x³</button>
   <button>x²</button>
   <button class="equal">=</button>

    </div>
    </div>
     <script src="script.js"></script>
    </body>

</html>
